# Auto-close new issues and PRs from non-collaborators so the maintainer
# can review the tracker on a deliberate cadence instead of in real time.
# See CONTRIBUTING.md for the full policy.
#
# Bypass labels (applied by maintainers before this runs are honored):
#   - `lgtm`: future issues AND PRs from this user are not auto-closed
#   - `lgtmi`: future issues from this user are not auto-closed (not PRs)
#   - `approved`: this specific issue/PR is not auto-closed
#
# Author associations skipped (treated as maintainers):
#   OWNER, MEMBER, COLLABORATOR

name: auto-close

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Decide and close
        uses: actions/github-script@v9
        with:
          script: |
            const isPR = !!context.payload.pull_request;
            const item = context.payload.issue || context.payload.pull_request;
            const number = item.number;
            const author = item.user.login;
            const assoc = item.author_association;

            // Maintainers and collaborators are never auto-closed.
            if (['OWNER', 'MEMBER', 'COLLABORATOR'].includes(assoc)) {
              core.info(`Skipping ${number}: author_association=${assoc}`);
              return;
            }

            // Honor an existing bypass label on this item.
            const labels = (item.labels || []).map(l => l.name);
            if (labels.includes('approved') || labels.includes('lgtm')) {
              core.info(`Skipping ${number}: has bypass label`);
              return;
            }

            // Check if the author has been previously approved via lgtm/lgtmi
            // on any of their past closed issues. Cheap query, capped at 30.
            const { data: priorIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: author,
              state: 'closed',
              per_page: 30,
            });

            for (const prior of priorIssues) {
              const priorLabels = (prior.labels || []).map(l =>
                typeof l === 'string' ? l : l.name
              );
              if (priorLabels.includes('lgtm')) {
                core.info(`Skipping ${number}: author has prior lgtm`);
                return;
              }
              if (!isPR && priorLabels.includes('lgtmi')) {
                core.info(`Skipping ${number}: author has prior lgtmi (issue only)`);
                return;
              }
            }

            // Weekend close: Fri/Sat/Sun (UTC).
            const day = new Date().getUTCDay(); // 0=Sun, 5=Fri, 6=Sat
            const isWeekend = day === 0 || day === 5 || day === 6;

            const body = isPR
              ? `Thanks for the contribution.\n\nPRs from new contributors are auto-closed by default. Submitting a PR requires prior \`lgtm\` approval on an issue. Please open an issue describing the change first.\n\nSee [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) for the full policy. A maintainer reviews auto-closed items daily and reopens worthwhile ones.`
              : isWeekend
                ? `Thanks for the report.\n\nIssues submitted Friday through Sunday are auto-closed and are not part of the Monday review queue. If your report is real and worth reading, a maintainer may reopen it on Monday.\n\nSee [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) for the quality bar.`
                : `Thanks for the report.\n\nNew contributors' issues are auto-closed by default. A maintainer reviews auto-closed issues daily and reopens worthwhile ones.\n\nIssues that do not meet the quality bar in [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) will not be reopened or receive a reply.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              body,
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              state: 'closed',
              state_reason: 'not_planned',
            });

            core.info(`Closed ${isPR ? 'PR' : 'issue'} #${number} from ${author} (assoc=${assoc})`);
