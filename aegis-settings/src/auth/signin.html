<!doctype html>
<html lang="en" class="h-full bg-[#1a1a1a]">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aegis · Sign in</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="h-full" data-tauri-drag-region>
    <div class="flex min-h-full flex-col justify-center px-6 py-8 lg:px-8">
      <div id="signin-card" class="sm:mx-auto sm:w-full sm:max-w-sm">
        <img src="../welcome/cursor.svg" alt="Aegis" class="mx-auto h-20 w-auto" />
        <h2 class="mt-10 text-center text-2xl/9 font-bold tracking-tight text-white">Sign in to your account</h2>

        <div class="mt-10">
          <form action="#" method="POST" class="space-y-6" id="signin-form">
            <div>
              <label for="email" class="block text-sm/6 font-medium text-gray-100">Email address</label>
              <div class="mt-2">
                <input id="email" type="email" name="email" required autocomplete="email" class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1 outline-[#ff8c00]/30 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-[#ff8c00] sm:text-sm/6" />
              </div>
            </div>

            <div>
              <div class="flex items-center justify-between">
                <label for="password" class="block text-sm/6 font-medium text-gray-100">Password</label>
                <div class="text-sm">
                  <a href="#" class="font-semibold text-[#ff8c00] hover:text-[#ffa500]">Forgot password?</a>
                </div>
              </div>
              <div class="mt-2">
                <input id="password" type="password" name="password" required autocomplete="current-password" class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1 outline-[#ff8c00]/30 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-[#ff8c00] sm:text-sm/6" />
              </div>
            </div>

            <div>
              <button type="submit" class="flex w-full justify-center rounded-md bg-[#ff8c00] px-3 py-1.5 text-sm/6 font-semibold text-white hover:bg-[#ffa500] focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[#ff8c00]">Sign in</button>
            </div>
          </form>

          <p class="mt-10 text-center text-sm/6 text-gray-400">
            Not a member?
            <a href="#" class="font-semibold text-[#ff8c00] hover:text-[#ffa500]">Start a 14 day free trial</a>
          </p>
        </div>
      </div>
    </div>

    <script src="signin.js" defer></script>
  </body>
</html>
